<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CR Consultoria - Gestão de Equipe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: #2d2d3d;
  --text: #e8e8f0;
  --text2: #9090a8;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --red: #e17055;
  --orange: #fdcb6e;
  --blue: #74b9ff;
  --radius: 10px;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.hidden { display: none !important; }

/* LAYOUT */
.app-container { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 220px; background: var(--surface); border-right: 1px solid var(--border);
  padding: 20px 0; flex-shrink: 0; display: flex; flex-direction: column;
}
.sidebar-logo {
  padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  font-size: 14px; color: var(--accent2); font-weight: 700; letter-spacing: 0.5px;
}
.sidebar-logo span { color: var(--text2); font-weight: 400; }
.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
.nav-item {
  padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
  color: var(--text2); transition: all 0.2s; display: flex; align-items: center; gap: 10px;
  border: none; background: transparent; text-align: left; width: 100%;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent); color: white; }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); margin-top: auto; }
.funcionario-info { font-size: 12px; color: var(--text2); }
.funcionario-info strong { color: var(--text); display: block; font-size: 13px; }

/* MAIN */
.main-content { flex: 1; padding: 24px 32px; overflow-y: auto; max-height: 100vh; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { color: var(--text2); font-size: 13px; margin-bottom: 24px; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

/* FORM */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row.three { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; color: var(--text2); }
.form-group input, .form-group select, .form-group textarea {
  padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none; transition: border 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.btn {
  padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px;
  font-weight: 600; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-success { background: var(--green); color: white; }
.btn-danger { background: var(--red); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* TABLE */
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; color: var(--text2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tr:hover { background: var(--surface2); }
.tag {
  display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.tag-pendente { background: rgba(253,203,110,0.15); color: var(--orange); }
.tag-concluido { background: rgba(0,184,148,0.15); color: var(--green); }
.tag-andamento { background: rgba(108,92,231,0.15); color: var(--accent2); }
.actions-cell { display: flex; gap: 4px; }
.actions-cell button { padding: 4px 8px; font-size: 11px; }

/* CRONOMETRO */
.cronometro-display { text-align: center; padding: 20px 0; }
.cronometro-display .time {
  font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 4px;
}
.cronometro-display .status-text { font-size: 13px; color: var(--text2); margin-top: 4px; }
.cronometro-actions { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
.cronometro-actions .btn { min-width: 100px; }

/* FILTROS */
.filtros-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: end; }
.filtros-bar .form-group { min-width: 150px; }
.filtros-bar .btn { height: 38px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal-content {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
}
.modal-content h3 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: end; margin-top: 16px; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* LOADING */
.loading { text-align: center; padding: 40px; color: var(--text2); }
.loading .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar-logo span, .sidebar-nav .nav-text, .funcionario-info { display: none; }
  .sidebar-logo { font-size: 10px; padding: 10px; text-align: center; }
  .nav-item { justify-content: center; padding: 10px; }
  .main-content { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
  .filtros-bar { flex-direction: column; }
  .filtros-bar .form-group { width: 100%; }
}

/* SELETOR FUNCIONARIO LOGIN */
.login-screen {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background: var(--bg);
}
.login-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px; width: 90%; max-width: 380px; text-align: center;
}
.login-card h2 { font-size: 20px; margin-bottom: 4px; }
.login-card p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
.login-card .form-group { margin-bottom: 16px; }
.login-card .form-group select { width: 100%; padding: 12px; font-size: 15px; }
.login-card .btn { width: 100%; padding: 12px; font-size: 15px; }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div style="font-size:36px;margin-bottom:8px;">👋</div>
    <h2>CR Consultoria</h2>
    <p>Selecione seu nome para acessar</p>
    <div class="form-group">
      <select id="loginFuncionario">
        <option value="">— Selecione —</option>
        <option value="Cecília">Cecília (Admin)</option>
        <option value="Thamires">Thamires</option>
        <option value="Sophia">Sophia</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
    <div id="loginError" style="color:var(--red);font-size:12px;margin-top:8px;display:none;">Selecione seu nome para continuar</div>
  </div>
</div>

<!-- APP -->
<div id="appContainer" class="app-container hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">CR<span> Consultoria</span></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="navegar('dashboard')">
        <span class="icon">📊</span><span class="nav-text">Dashboard</span>
      </button>
      <button class="nav-item" onclick="navegar('cronometro')">
        <span class="icon">⏱️</span><span class="nav-text">Cronômetro</span>
      </button>
      <button class="nav-item" onclick="navegar('registros')">
        <span class="icon">📋</span><span class="nav-text">Registros</span>
      </button>
      <button class="nav-item" onclick="navegar('equipe')">
        <span class="icon">👥</span><span class="nav-text">Equipe</span>
      </button>
      <button class="nav-item" onclick="navegar('relatorios')">
        <span class="icon">📈</span><span class="nav-text">Relatórios</span>
      </button>
      <button class="nav-item" onclick="navegar('adm')">
        <span class="icon">⚙️</span><span class="nav-text">Admin</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="funcionario-info">
        <strong id="sidebarNome">—</strong>
        <span id="sidebarCargo">Colaborador</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">
    <!-- Renderizado via JS -->
  </main>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyeU9gtN2RHXyGGmoZbvdkJqdvkyO9mxRfaB8KTfkJYd0YvsQ1SCh8s4dzawbZWS-Z1Lw/exec'; // ← COLE A URL DO APPS SCRIPT AQUI

const FUNCIONARIOS = [
  { nome: 'Cecília', admin: true },
  { nome: 'Thamires', admin: false },
  { nome: 'Sophia', admin: false }
];

const ATIVIDADES_PADRAO = ['Consultoria', 'Reunião', 'Análise', 'Relatório', 'Projeto', 'Administrativo', 'Atendimento', 'Outro'];

// Estado global
let state = {
  funcionarioAtual: null,
  registros: [],
  filtroFuncionario: 'todos',
  filtroAtividade: 'todas',
  filtroData: '',
  cronometroAtivo: null,
  cronometroInterval: null,
  cronometroInicio: null,
  cronometroObservacao: ''
};

// ============================================================
// API
// ============================================================
async function api(method, body) {
  const url = API_URL + (method === 'GET' ? '?action=read' : '');
  const opts = { method };
  if (method === 'POST') {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  try {
    const res = await fetch(url, opts);
    const text = await res.text();
    return JSON.parse(text);
  } catch(e) {
    return { success: false, error: e.message };
  }
}

async function carregarRegistros() {
  const res = await api('GET');
  if (res.success) state.registros = res.data;
  return state.registros;
}

async function criarRegistro(dados) {
  return await api('POST', { action: 'create', ...dados });
}

async function atualizarRegistro(dados) {
  return await api('POST', { action: 'update', ...dados });
}

async function deletarRegistro(id) {
  return await api('POST', { action: 'delete', id });
}

// ============================================================
// LOGIN
// ============================================================
function fazerLogin() {
  const nome = document.getElementById('loginFuncionario').value;
  if (!nome) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  document.getElementById('loginError').style.display = 'none';
  state.funcionarioAtual = nome;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appContainer').classList.remove('hidden');
  document.getElementById('sidebarNome').textContent = nome;
  const func = FUNCIONARIOS.find(f => f.nome === nome);
  document.getElementById('sidebarCargo').textContent = func?.admin ? 'Administradora' : 'Colaboradora';
  iniciarApp();
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
function navegar(pagina) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item:nth-child(${['dashboard','cronometro','registros','equipe','relatorios','adm'].indexOf(pagina)+1})`)?.classList.add('active');
  renderizarPagina(pagina);
}

function renderizarPagina(pagina) {
  const main = document.getElementById('mainContent');
  if (pagina === 'dashboard') renderDashboard(main);
  else if (pagina === 'cronometro') renderCronometro(main);
  else if (pagina === 'registros') renderRegistros(main);
  else if (pagina === 'equipe') renderEquipe(main);
  else if (pagina === 'relatorios') renderRelatorios(main);
  else if (pagina === 'adm') renderAdmin(main);
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(el) {
  const hoje = new Date().toISOString().split('T')[0];
  const registrosHoje = state.registros.filter(r => r.data === hoje);
  const emAndamento = registrosHoje.filter(r => r.status === 'andamento');
  const concluidos = registrosHoje.filter(r => r.status === 'concluido');
  const pendentes = registrosHoje.filter(r => r.status === 'pendente');
  const totalHoras = registrosHoje.reduce((acc, r) => {
    if (r.total) {
      const partes = r.total.split(':');
      return acc + parseInt(partes[0]) * 60 + parseInt(partes[1]);
    }
    return acc;
  }, 0);

  el.innerHTML = `
    <h1 class="page-title">📊 Dashboard</h1>
    <p class="page-subtitle">Resumo do dia · ${new Date().toLocaleDateString('pt-BR')}</p>
    
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;">
      <div class="card" style="text-align:center;padding:16px;">
        <div style="font-size:28px;font-weight:700;color:var(--accent2);">${registrosHoje.length}</div>
        <div style="font-size:12px;color:var(--text2);">Registros hoje</div>
      </div>
      <div class="card" style="text-align:center;padding:16px;">
        <div style="font-size:28px;font-weight:700;color:var(--green);">${concluidos.length}</div>
        <div style="font-size:12px;color:var(--text2);">Concluídos</div>
      </div>
      <div class="card" style="text-align:center;padding:16px;">
        <div style="font-size:28px;font-weight:700;color:var(--orange);">${pendentes.length}</div>
        <div style="font-size:12px;color:var(--text2);">Pendentes</div>
      </div>
      <div class="card" style="text-align:center;padding:16px;">
        <div style="font-size:28px;font-weight:700;color:var(--blue);">${Math.floor(totalHoras/60)}h${totalHoras%60}m</div>
        <div style="font-size:12px;color:var(--text2);">Horas registradas</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Atividades de hoje</div>
      ${registrosHoje.length === 0 ? `<div class="empty-state"><div class="icon">📭</div><p>Nenhum registro hoje ainda</p></div>` : `
      <div class="table-container">
        <table>
          <thead><tr><th>Funcionário</th><th>Atividade</th><th>Horário</th><th>Total</th><th>Status</th></tr></thead>
          <tbody>
            ${registrosHoje.map(r => `
              <tr>
                <td><strong>${r.funcionario}</strong></td>
                <td>${r.atividade}</td>
                <td>${r.horaInicio || '-'}${r.horaFim ? ' → '+r.horaFim : ''}</td>
                <td>${r.total || '-'}</td>
                <td><span class="tag tag-${r.status}">${r.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`}
    </div>
    <div id="errorMsg" style="display:none;padding:12px;background:rgba(225,112,85,0.1);border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;margin-top:12px;"></div>
  `;
}

// ============================================================
// CRONÔMETRO
// ============================================================
function renderCronometro(el) {
  const func = FUNCIONARIOS.find(f => f.nome === state.funcionarioAtual);
  const isAdmin = func?.admin;

  el.innerHTML = `
    <h1 class="page-title">⏱️ Cronômetro</h1>
    <p class="page-subtitle">Registre suas atividades em tempo real</p>

    <div class="card">
      <div class="card-title">Cronômetro</div>
      <div class="cronometro-display">
        <div class="time" id="cronometroTime">00:00:00</div>
        <div class="status-text" id="cronometroStatus">Parado</div>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Atividade</label>
        <select id="cronometroAtividade">
          ${ATIVIDADES_PADRAO.map(a => `<option value="${a}">${a}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Observação (opcional)</label>
        <textarea id="cronometroObs" placeholder="Detalhes da atividade..."></textarea>
      </div>
      <div class="cronometro-actions">
        <button class="btn btn-success" id="btnIniciar" onclick="iniciarCronometro()">▶ Iniciar</button>
        <button class="btn btn-outline hidden" id="btnPausar" onclick="pausarCronometro()">⏸ Pausar</button>
        <button class="btn btn-primary hidden" id="btnRetomar" onclick="retomarCronometro()">▶ Retomar</button>
        <button class="btn btn-danger hidden" id="btnParar" onclick="pararCronometro()">⏹ Parar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Registros de hoje</div>
      <div id="cronometroRegistros"></div>
    </div>
    <div id="errorMsg" style="display:none;padding:12px;background:rgba(225,112,85,0.1);border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;margin-top:12px;"></div>
    <div id="successMsg" style="display:none;padding:12px;background:rgba(0,184,148,0.1);border:1px solid var(--green);border-radius:8px;color:var(--green);font-size:13px;margin-top:12px;"></div>
  `;
  atualizarCronometroRegistros();
}

function atualizarCronometroRegistros() {
  const hoje = new Date().toISOString().split('T')[0];
  const meus = state.registros.filter(r => r.funcionario === state.funcionarioAtual && r.data === hoje && r.status !== 'andamento');
  const div = document.getElementById('cronometroRegistros');
  if (!div) return;
  if (meus.length === 0) {
    div.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhum registro finalizado hoje</p></div>';
    return;
  }
  div.innerHTML = `
    <div class="table-container">
      <table>
        <thead><tr><th>Atividade</th><th>Início</th><th>Fim</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>
          ${meus.map(r => `
            <tr>
              <td>${r.atividade}</td>
              <td>${r.horaInicio || '-'}</td>
              <td>${r.horaFim || '-'}</td>
              <td>${r.total || '-'}</td>
              <td><span class="tag tag-${r.status}">${r.status}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function iniciarCronometro() {
  const atividade = document.getElementById('cronometroAtividade').value;
  if (!atividade) return mostrarErro('Selecione uma atividade');
  state.cronometroAtivo = atividade;
  state.cronometroInicio = new Date();
  state.cronometroObservacao = document.getElementById('cronometroObs').value;
  state.cronometroSegundos = 0;
  document.getElementById('btnIniciar').classList.add('hidden');
  document.getElementById('btnParar').classList.remove('hidden');
  document.getElementById('btnPausar').classList.remove('hidden');
  document.getElementById('cronometroStatus').textContent = '▶ Rodando';
  document.getElementById('cronometroStatus').style.color = 'var(--green)';
  if (state.cronometroInterval) clearInterval(state.cronometroInterval);
  state.cronometroInterval = setInterval(() => {
    state.cronometroSegundos++;
    const h = Math.floor(state.cronometroSegundos / 3600);
    const m = Math.floor((state.cronometroSegundos % 3600) / 60);
    const s = state.cronometroSegundos % 60;
    document.getElementById('cronometroTime').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
  document.getElementById('cronometroAtividade').disabled = true;
  document.getElementById('cronometroObs').disabled = true;
}

function pausarCronometro() {
  if (state.cronometroInterval) clearInterval(state.cronometroInterval);
  document.getElementById('btnPausar').classList.add('hidden');
  document.getElementById('btnRetomar').classList.remove('hidden');
  document.getElementById('cronometroStatus').textContent = '⏸ Pausado';
  document.getElementById('cronometroStatus').style.color = 'var(--orange)';
}

function retomarCronometro() {
  document.getElementById('btnRetomar').classList.add('hidden');
  document.getElementById('btnPausar').classList.remove('hidden');
  document.getElementById('cronometroStatus').textContent = '▶ Rodando';
  document.getElementById('cronometroStatus').style.color = 'var(--green)';
  state.cronometroInterval = setInterval(() => {
    state.cronometroSegundos++;
    const h = Math.floor(state.cronometroSegundos / 3600);
    const m = Math.floor((state.cronometroSegundos % 3600) / 60);
    const s = state.cronometroSegundos % 60;
    document.getElementById('cronometroTime').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

async function pararCronometro() {
  if (state.cronometroInterval) clearInterval(state.cronometroInterval);
  state.cronometroInterval = null;
  
  const h = Math.floor(state.cronometroSegundos / 3600);
  const m = Math.floor((state.cronometroSegundos % 3600) / 60);
  const s = state.cronometroSegundos % 60;
  const total = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const agora = new Date();
  const inicioStr = state.cronometroInicio.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  const fimStr = agora.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  const hoje = agora.toISOString().split('T')[0];

  // Criar registro no servidor
  const res = await criarRegistro({
    data: hoje,
    funcionario: state.funcionarioAtual,
    atividade: state.cronometroAtivo,
    horaInicio: inicioStr,
    horaFim: fimStr,
    total: total,
    observacao: state.cronometroObservacao,
    status: 'concluido'
  });

  if (res.success) {
    // Recarregar registros
    await carregarRegistros();
    // Resetar cronômetro
    state.cronometroAtivo = null;
    state.cronometroInicio = null;
    state.cronometroObservacao = '';
    state.cronometroSegundos = 0;
    document.getElementById('cronometroTime').textContent = '00:00:00';
    document.getElementById('cronometroStatus').textContent = 'Parado';
    document.getElementById('cronometroStatus').style.color = 'var(--text2)';
    document.getElementById('btnIniciar').classList.remove('hidden');
    document.getElementById('btnPausar').classList.add('hidden');
    document.getElementById('btnRetomar').classList.add('hidden');
    document.getElementById('btnParar').classList.add('hidden');
    document.getElementById('cronometroAtividade').disabled = false;
    document.getElementById('cronometroObs').disabled = false;
    document.getElementById('cronometroObs').value = '';
    mostrarSucesso('Registro salvo com sucesso!');
    atualizarCronometroRegistros();
  } else {
    mostrarErro('Erro ao salvar. Tente novamente.');
    state.cronometroSegundos = h*3600 + m*60 + s;
    state.cronometroInterval = setInterval(() => {
      state.cronometroSegundos++;
      const hh = Math.floor(state.cronometroSegundos / 3600);
      const mm = Math.floor((state.cronometroSegundos % 3600) / 60);
      const ss = state.cronometroSegundos % 60;
      document.getElementById('cronometroTime').textContent =
        `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }, 1000);
  }
}

function aplicarFiltros() {
  const filtroFunc = document.getElementById('filtroFuncionario')?.value || 'todos';

  const filtroData = document.getElementById('filtroData')?.value || '';
  const func = FUNCIONARIOS.find(f => f.nome === state.funcionarioAtual);
  const isAdmin = func?.admin;

  let dados = [...state.registros];
  if (filtroFunc !== 'todos') dados = dados.filter(r => r.funcionario === filtroFunc);
  if (filtroAtiv !== 'todas') dados = dados.filter(r => r.atividade === filtroAtiv);
  if (filtroData) dados = dados.filter(r => r.data === filtroData);
  dados.sort((a, b) => (b.data||'').localeCompare(a.data||''));

  const tbody = document.getElementById('registrosTbody');
  const empty = document.getElementById('registrosEmpty');
  if (!tbody) return;

  if (dados.length === 0) {
    tbody.innerHTML = '';
    if (empty) empty.classList.remove('hidden');
    return;

  if (empty) empty.classList.add('hidden');

  tbody.innerHTML = dados.map(r => {
    const podeEditar = isAdmin || r.funcionario === state.funcionarioAtual;

function gerarRelatorio() {
  const func = document.getElementById('relFuncionario').value;
  const inicio = document.getElementById('relDataInicio').value;
  const fim = document.getElementById('relDataFim').value;

  let dados = [...state.registros];
  if (func !== 'todos') dados = dados.filter(r => r.funcionario === func);
  if (inicio) dados = dados.filter(r => r.data >= inicio);
  if (fim) dados = dados.filter(r => r.data <= fim);
  dados.sort((a, b) => (a.data||'').localeCompare(b.data||''));

  const div = document.getElementById('relatorioResultado');
  const body = document.getElementById('relatorioBody');
  div.style.display = 'block';

  if (dados.length === 0) {
    body.innerHTML = '<div class="empty-state"><p>Nenhum registro encontrado</p></div>';
    return;
  }

  // Agrupar por funcionário
  const grupos = {};
  dados.forEach(r => {
    if (!grupos[r.funcionario]) grupos[r.funcionario] = [];
    grupos[r.funcionario].push(r);
  });

  let html = '';
  Object.keys(grupos).forEach(nome => {
    const regs = grupos[nome];
    const totalMin = regs.reduce((acc, r) => {
      if (r.total) {
        const p = r.total.split(':');
        return acc + parseInt(p[0])*60 + parseInt(p[1]);
      }
      return acc;
    }, 0);
    html += `
      <div style="margin-bottom:16px;">
        <h3 style="font-size:15px;margin-bottom:8px;">${nome} — ${regs.length} registros · ${Math.floor(totalMin/60)}h${totalMin%60}m</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>Data</th><th>Atividade</th><th>Início</th><th>Fim</th><th>Total</th><th>Obs</th></tr></thead>
            <tbody>
              ${regs.map(r => `<tr><td>${r.data ? new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR') : '-'}</td><td>${r.atividade||'-'}</td><td>${r.horaInicio||'-'}</td><td>${r.horaFim||'-'}</td><td>${r.total||'-'}</td><td>${r.observacao||'-'}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  });

  body.innerHTML = html;
}

function exportarCSV() {
  const func = document.getElementById('relFuncionario')?.value || 'todos';
  const inicio = document.getElementById('relDataInicio')?.value || '';
  const fim = document.getElementById('relDataFim')?.value || '';

  let dados = [...state.registros];
  if (func !== 'todos') dados = dados.filter(r => r.funcionario === func);
  if (inicio) dados = dados.filter(r => r.data >= inicio);
  if (fim) dados = dados.filter(r => r.data <= fim);

  if (dados.length === 0) {
    mostrarErro('Nenhum registro para exportar');
    return;
  }

  const headers = 'Data,Funcionário,Atividade,Início,Fim,Total,Observação,Status';
  const rows = dados.map(r =>
    `"${r.data||''}","${r.funcionario||''}","${r.atividade||''}","${r.horaInicio||''}","${r.horaFim||''}","${r.total||''}","${(r.observacao||'').replace(/"/g,'""')}","${r.status||''}"`
  ).join('\n');

  const csv = '\uFEFF' + headers + '\n' + rows;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `relatorio_cr_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
}

async function importarBackup() {
  const input = document.getElementById('backupFileInput');
  if (!input.files || !input.files[0]) {
    mostrarErro('Selecione um arquivo de backup');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const json = JSON.parse(e.target.result);
      const dados = json.data || json;
      if (!Array.isArray(dados) || dados.length === 0) {
        mostrarErro('Arquivo inválido ou vazio');
        return;
      }
      
      let importados = 0;
      for (const reg of dados) {
        const res = await criarRegistro({
          data: reg.data || '',
          funcionario: reg.funcionario || state.funcionarioAtual,
          atividade: reg.atividade || 'Outro',
          horaInicio: reg.horaInicio || '',
          horaFim: reg.horaFim || '',
          total: reg.total || '',
          observacao: reg.observacao || '',
          status: reg.status || 'pendente'
        });
        if (res.success) importados++;
      }
      
      await carregarRegistros();
      mostrarSucesso(`${importados} registros importados com sucesso!`);
      input.value = '';
    } catch(err) {
      mostrarErro('Erro ao processar o arquivo: ' + err.message);
    }
  };
  reader.readAsText(input.files[0]);
}

    if (ativa) {
      const idx = Array.from(document.querySelectorAll('.nav-item')).indexOf(ativa);
      const paginas = ['dashboard','cronometro','registros','equipe','relatorios','adm'];
      renderizarPagina(paginas[idx]);
    }
  } else {
    mostrarErro('Erro ao salvar. Tente novamente.');
  }
}

function confirmarExclusao(id) {
  const reg = state.registros.find(r => r.id === id);
  abrirModal(`
    <h3>🗑️ Confirmar exclusão</h3>
    <p style="font-size:14px;color:var(--text2);margin-bottom:16px;">
      Tem certeza que deseja excluir o registro de <strong>${reg?.funcionario || ''}</strong> — <strong>${reg?.atividade || ''}</strong>?
    </p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="executarExclusao('${id}')">🗑️ Excluir</button>
    </div>
  `);
}

async function executarExclusao(id) {
  fecharModal();
  const res = await deletarRegistro(id);
  if (res.success) {
    await carregarRegistros();
    mostrarSucesso('Registro excluído!');
    const ativa = document.querySelector('.nav-item.active');
    if (ativa) {
      const idx = Array.from(document.querySelectorAll('.nav-item')).indexOf(ativa);
      const paginas = ['dashboard','cronometro','registros','equipe','relatorios','adm'];
      renderizarPagina(paginas[idx]);
    }
  } else {
    mostrarErro('Erro ao excluir. Tente novamente.');
  }
}

// ============================================================
// MENSAGENS
// ============================================================
function mostrarErro(msg) {
  const el = document.getElementById('errorMsg');
  if (el) { el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
}

function mostrarSucesso(msg) {
  const el = document.getElementById('successMsg');
  if (el) { el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
}

// ============================================================
// INICIALIZAÇÃO
// ============================================================
async function iniciarApp() {
  await carregarRegistros();
  renderizarPagina('dashboard');
  // Recarregar a cada 30 segundos
  setInterval(async () => {
    await carregarRegistros();
    const ativa = document.querySelector('.nav-item.active');
    if (ativa) {
      const idx = Array.from(document.querySelectorAll('.nav-item')).indexOf(ativa);
      const paginas = ['dashboard','cronometro','registros','equipe','relatorios','adm'];
      renderizarPagina(paginas[idx]);
    }
  }, 30000);
}
</script>
